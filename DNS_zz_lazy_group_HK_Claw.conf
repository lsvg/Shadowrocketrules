Web3Wallet = select,🎯 NODE_JP,policy-select-name=🎯 NODE_JP
Google = select,🎯 NODE_US_WEST,policy-select-name=🎯 NODE_US_WEST
YouTube = select,🎯 NODE_YOUTUBE,policy-select-name=🌍NODE_YOUTUBE
Crypto = select,🎯 NODE_JP,policy-select-name=🎯 NODE_JP
ChatGPT = select,🎯 NODE_CHATGPT,policy-select-name=XINGJN
PayPal = select,🎯 NODE_US_WEST,policy-select-name=🎯 NODE_US_WEST
TikTok = select,🎯 NODE_US_WEST
EU = select,🎯NODE_EU,policy-select-name=🎯NODE_EU
USwest = select,🎯 NODE_US_WEST
➡️DIRECT = select,DIRECT
🎯NODE_US_EAST = select,ZZ_US_EAST_REALITY,policy-select-name=ZZ_US_EAST_REALITY
🎯 NODE_US_WEST = select,ZZ_US_WEST_REALITY,policy-select-name=ZZ_US_WEST_REALITY
🎯 NODE_ChatGPT = select,XINGJN,policy-select-name=XINGJN
🎯NODE_EU = select,ZZ_EU_REALITY,policy-select-name=ZZ_EU_REALITY
🎯 NODE_JP = select,policy-select-name=ZZ_JP_REALITY,policy-regex-filter=zz_JP
🎯 NODE_YouTube = select,XINGJN,policy-select-name=XINGJN

